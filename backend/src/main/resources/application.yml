spring:
  application:
    name: ai-answer-vault
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
    livereload:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/vault
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  cors:
    allowed-origins: "http://localhost:5173"
